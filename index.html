<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Minh Chứng Cá Nhân</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>

<nav class="navbar">
    <div class="container nav-content">
        <div class="nav-left">
            <a href="index.html" class="btn-back">
                <i class="fas fa-chevron-left"></i>
                <span>Quay về</span>
            </a>
            <div class="brand-divider"></div>
            <div class="app-icon"><i class="fas fa-award"></i></div>
        </div>
        <ul class="nav-links">
            <li><a href="#" class="active">Sự kiện của tôi</a></li>
            <li><a href="#">Tất cả hoạt động</a></li>
        </ul>
    </div>
</nav>

<main class="container">
    <section class="hero-section">
        <h1>Lịch sử tham gia</h1>
        <p>Quản lý và tải chứng nhận các hoạt động đã hoàn thành.</p>
    </section>

    <div class="filter-wrapper">
        <div class="tabs-modern">
            <button class="tab-item active" onclick="setFilter('all', this)">Tất cả</button>
            <button class="tab-item" onclick="setFilter('attended', this)">Đã tham gia</button>
            <button class="tab-item" onclick="setFilter('upcoming', this)">Sắp tới</button>
        </div>
        <div class="search-modern">
            <i class="fas fa-search"></i>
            <input type="text" id="searchInput" placeholder="Tìm tên sự kiện..." onkeyup="renderEvents()">
        </div>
    </div>

    <div class="event-grid" id="event-container"></div>
</main>

<div id="proofModal" class="modal">
    <div class="modal-card">
        <div class="modal-header">
            <h3>Chi tiết chứng nhận</h3>
            <span class="close-modal" onclick="closeModal()">&times;</span>
        </div>
        <div id="modalBody" class="modal-body"></div>
        <div class="modal-footer">
            <button class="btn-secondary" onclick="closeModal()">Đóng</button>
            <button class="btn-primary" id="downloadBtn">
                <i class="fas fa-file-pdf"></i> Tải file PDF
            </button>
        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
